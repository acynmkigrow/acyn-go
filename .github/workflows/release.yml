name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v1.0.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Verify agent module exists
        run: |
          test -f agent/go.mod || { echo "agent/go.mod missing"; exit 1; }
          test -f agent/main.go || { echo "agent/main.go missing"; exit 1; }

      - name: Tidy modules
        working-directory: agent
        run: go mod tidy

      - name: Verify module files are committed
        run: git diff --exit-code -- agent/go.mod agent/go.sum

      - name: Build agent (sanity check)
        working-directory: agent
        run: go build -ldflags="-s -w" -o /tmp/acyn-go .

      - name: Test agent
        working-directory: agent
        run: go test ./...

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v1.0.6"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          HEAD_SHA="$(git rev-parse HEAD)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists. Pick a new version."
            exit 1
          fi

          git fetch --tags --force --quiet
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$VERSION:refs/tags/$VERSION"
            TAG_SHA="$(git rev-list -n 1 "$VERSION")"
            if [[ "$TAG_SHA" != "$HEAD_SHA" ]]; then
              echo "Tag $VERSION already exists on a different commit ($TAG_SHA). Pick a new version."
              exit 1
            fi
            echo "Tag $VERSION already exists on this commit without a release; reusing it."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION"
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          workdir: agent
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "${{ steps.release.outputs.version }}" --json tagName,url,assets
