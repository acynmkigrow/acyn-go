version: 2

project_name: acyn-go

before:
  hooks:
    - go mod tidy

builds:
  - id: acyn-go
    main: .
    binary: acyn-go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    goamd64: [v1]

archives:
  - id: default
    name_template: "acyn-go_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: acynmkigrow
    name: acyn-go
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
